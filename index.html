<html lang="en">
  <head>

    <title>JCPenney Weekly Ad | Shop and Save at JCPenney!</title>

    <!-- Flipp SDK -->
    <script

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #333;
        background: #fff;
      }

      /* ─── Header ─── */
      .header {
        border-bottom: 1px solid #e0e0e0;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .header a.logo-link { display: inline-flex; }
      .logo-svg { height: 34px; width: auto; }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        border: 1px solid #ccc;
        border-radius: 999px;
        background: #fff;
        color: #333;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      }
      .back-btn:hover {
        background: #f5f5f5;
        border-color: #aaa;
        box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      }
      .back-btn svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      /* ─── Banner ─── */
      .banner {
        max-width: 1100px;
        margin: 32px auto 24px;
        padding: 0 24px;
        text-align: center;
      }
      .banner h1 {
        font-size: 26px;
        font-weight: 700;
        color: #111;
        margin-bottom: 8px;
      }
      .banner p {
        font-size: 15px;
        color: #555;
        line-height: 1.5;
      }

      /* ─── Storefront container ─── */
      .storefront-wrap {
        width: 80%;
        margin: 0 auto;
        padding: 0 0 48px;
      }
      #flipp-container {
        min-height: 70vh;
      }

      /* ─── Footer ─── */
      .footer {
        border-top: 1px solid #e0e0e0;
        text-align: center;
        padding: 18px 24px;
        font-size: 12px;
        color: #999;
      }
    </style>
  </head>

  <body>

    <!-- Maintenance banner -->
    <div class="banner">
      <h1>Weekly Ad</h1>
      <p>Our weekly ad page is currently under maintenance. In the meantime, you can still browse this week's deals below.</p>

    <!-- Flipp storefront -->
    <div class="storefront-wrap">
      <div id="flipp-container"></div>
    </div>

    <footer class="footer">&copy; 2026 JCPenney</footer>

    <script>
      // ─── Credentials (lightly obfuscated) ───
      const _0x=['\x39\x33\x35\x64\x38\x34\x30\x32\x64\x33\x62\x31\x66\x30\x37\x37\x32\x61\x33\x62\x30\x37\x31\x38\x38\x30\x66\x33\x35\x30\x31\x32','\x32\x32\x30\x37','\x6a\x63\x70\x65\x6e\x6e\x65\x79'];
      const _at=_0x[0], _mid=_0x[1], _mni=_0x[2];

      function analyticsEngagement(e) { console.log("Engagement data:", e); }
      function analyticsItemClick(e)  { console.log("Item click data:", e); }
      function analyticsItemView(e)   { console.log("Item view data:", e); }
      function analyticsOpen(e)       { console.log("Open data:", e); }
      function analyticsFlyerView(e)  { console.log("Flyer view data:", e); }

      // ─── SDK loader ───
      function waitForFlippSDK({ timeoutMs = 8000, pollMs = 50 } = {}) {
        const started = Date.now();
        return new Promise((resolve, reject) => {
          const t = setInterval(() => {
            if (window.Flipp && window.Flipp.Storefront) { clearInterval(t); resolve(); return; }
            if (Date.now() - started > timeoutMs) { clearInterval(t); reject(new Error("Flipp SDK not available")); }
          }, pollMs);
        });
      }

      // ─── Render ───
      async function renderStorefront() {
        try {
          await waitForFlippSDK();
        } catch (e) {
          console.error(e);
          document.getElementById("flipp-container").textContent = "Unable to load weekly ad. Please try again later.";
          return;
        }

        const container = document.getElementById("flipp-container");

        try {
          const storefront = new Flipp.Storefront({
            accessToken: _at,
            merchantId: _mid,
            merchantNameIdentifier: _mni,
          });

          storefront.renderStorefront(container);
        } catch (e) {
          console.error(e);
          container.textContent = "Unable to load weekly ad. Please try again later.";
        }
      }

      window.addEventListener("load", renderStorefront);
    </script>

</html>
